<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
</head>
<body>
    
    {% for post in posts %}
        {{ loop.index }} {{ post.title }}<br>
        {% if loop.first %}
            <p>Premier article</p>
        {% endif %}

        {% if loop.last %}
            <p>Dernier article</p>
        {% endif %}
    {% endfor %}
</body>
</html>
